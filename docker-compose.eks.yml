services:
  backend-api:
    environment:
      ENABLED_BACKENDS: ${EKS_ENABLED_BACKENDS:-k8s}
      KUBECONFIG: /kubeconfig/config
      K8S_NAMESPACE: ${EKS_K8S_NAMESPACE:-openclaw-agents}
      K8S_EXPOSURE_MODE: ${EKS_K8S_EXPOSURE_MODE:-load-balancer}
      K8S_SERVICE_ANNOTATIONS_JSON: ${EKS_K8S_SERVICE_ANNOTATIONS_JSON:-}
      K8S_LOAD_BALANCER_SOURCE_RANGES: ${EKS_K8S_LOAD_BALANCER_SOURCE_RANGES:-}
      K8S_LOAD_BALANCER_CLASS: ${EKS_K8S_LOAD_BALANCER_CLASS:-}
      K8S_LOAD_BALANCER_READY_TIMEOUT_MS: ${EKS_K8S_LOAD_BALANCER_READY_TIMEOUT_MS:-1200000}
      K8S_LOAD_BALANCER_READY_INTERVAL_MS: ${EKS_K8S_LOAD_BALANCER_READY_INTERVAL_MS:-5000}
      DEPLOYMENT_JOB_TIMEOUT_MS: ${EKS_DEPLOYMENT_JOB_TIMEOUT_MS:-1800000}
      PROVISION_TIMEOUT_MS: ${EKS_PROVISION_TIMEOUT_MS:-1740000}
    volumes:
      - ${EKS_KUBECONFIG_PATH:-./.secrets/eks-kubeconfig}:/kubeconfig/config:ro

  worker-provisioner:
    environment:
      DEPLOYMENT_WORKER_CONCURRENCY: ${DEPLOYMENT_WORKER_CONCURRENCY:-6}
      ENABLED_BACKENDS: ${EKS_ENABLED_BACKENDS:-k8s}
      KUBECONFIG: /kubeconfig/config
      K8S_NAMESPACE: ${EKS_K8S_NAMESPACE:-openclaw-agents}
      K8S_EXPOSURE_MODE: ${EKS_K8S_EXPOSURE_MODE:-load-balancer}
      K8S_SERVICE_ANNOTATIONS_JSON: ${EKS_K8S_SERVICE_ANNOTATIONS_JSON:-}
      K8S_LOAD_BALANCER_SOURCE_RANGES: ${EKS_K8S_LOAD_BALANCER_SOURCE_RANGES:-}
      K8S_LOAD_BALANCER_CLASS: ${EKS_K8S_LOAD_BALANCER_CLASS:-}
      K8S_LOAD_BALANCER_READY_TIMEOUT_MS: ${EKS_K8S_LOAD_BALANCER_READY_TIMEOUT_MS:-1200000}
      K8S_LOAD_BALANCER_READY_INTERVAL_MS: ${EKS_K8S_LOAD_BALANCER_READY_INTERVAL_MS:-5000}
      DEPLOYMENT_JOB_TIMEOUT_MS: ${EKS_DEPLOYMENT_JOB_TIMEOUT_MS:-1800000}
      PROVISION_TIMEOUT_MS: ${EKS_PROVISION_TIMEOUT_MS:-1740000}
    volumes:
      - ${EKS_KUBECONFIG_PATH:-./.secrets/eks-kubeconfig}:/kubeconfig/config:ro
