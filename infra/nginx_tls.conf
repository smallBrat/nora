# infra/nginx_tls.conf — Production Nginx config with TLS (Let's Encrypt)
#
# Usage:
#   1. Run  infra/setup-tls.sh  to obtain certs via Certbot
#   2. It writes nginx.public.conf
#   3. Start nginx with infra/docker-compose.public-tls.yml, or use the
#      generated docker-compose.override.yml convenience file for plain
#      docker compose up
#
# Cert paths default to Let's Encrypt standard locations.

# Use all available CPU cores; a single worker (the nginx default) is a
# bottleneck under a launch-day traffic spike.
worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    resolver 127.0.0.11 ipv6=off valid=1s;

    # ── Cloudflare real client IP restoration ──────────────────────────
    # REQUIRED when this origin sits behind Cloudflare (orange-cloud proxy).
    # Without it nginx sees Cloudflare's edge IPs as $remote_addr, so the
    # per-IP rate limits below would bucket every visitor together and a
    # single edge IP could trip the limit for everyone. Uncomment to enable.
    # Verify the ranges are current at https://www.cloudflare.com/ips/.
    # set_real_ip_from 173.245.48.0/20;
    # set_real_ip_from 103.21.244.0/22;
    # set_real_ip_from 103.22.200.0/22;
    # set_real_ip_from 103.31.4.0/22;
    # set_real_ip_from 141.101.64.0/18;
    # set_real_ip_from 108.162.192.0/18;
    # set_real_ip_from 190.93.240.0/20;
    # set_real_ip_from 188.114.96.0/20;
    # set_real_ip_from 197.234.240.0/22;
    # set_real_ip_from 198.41.128.0/17;
    # set_real_ip_from 162.158.0.0/15;
    # set_real_ip_from 104.16.0.0/13;
    # set_real_ip_from 104.24.0.0/14;
    # set_real_ip_from 172.64.0.0/13;
    # set_real_ip_from 131.0.72.0/22;
    # set_real_ip_from 2400:cb00::/32;
    # set_real_ip_from 2606:4700::/32;
    # set_real_ip_from 2803:f800::/32;
    # set_real_ip_from 2405:b500::/32;
    # set_real_ip_from 2405:8100::/32;
    # set_real_ip_from 2a06:98c0::/29;
    # set_real_ip_from 2c0f:f248::/32;
    # real_ip_header CF-Connecting-IP;
    # real_ip_recursive on;

    large_client_header_buffers 4 32k;
    proxy_buffer_size 16k;
    proxy_buffers 4 16k;

    # Per-IP rate limiting (nginx-edge fence; Express applies tighter per-route limits on top).
    # auth_limit:  login/signup/oauth — tight to slow credential stuffing.
    # api_limit:   all other /api/* traffic — generous to avoid throttling
    #              interactive dashboard use while still catching bots.
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_status 429;

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      $scheme;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────
    server {
        listen 80;
        server_name ${DOMAIN};

        # ACME challenge for Let's Encrypt renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ───────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name ${DOMAIN};

        ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS (uncomment after confirming TLS works)
        # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Shared proxy settings
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        set $backend_api http://backend-api:4000;
        set $app_dashboard http://frontend-dashboard:3000;
        set $admin_dashboard http://admin-dashboard:3000;
        set $marketing_site http://frontend-marketing:3000;

        # 1a. WebSocket streams: logs & terminal (must be above /api/)
        location ~ ^/api/ws/(.*)$ {
            proxy_pass $backend_api/ws/$1$is_args$args;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }

        # 1b. Gateway SSE streams (chat) — disable buffering for real-time streaming
        location ~ ^/api/(agents/[^/]+/gateway/chat)$ {
            proxy_pass $backend_api/$1$is_args$args;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300;
            chunked_transfer_encoding off;
            proxy_set_header Accept-Encoding "";
        }

        # 1c. Gateway UI proxy — HTML, JS/CSS assets, favicons, internal paths, embed
        location ~ ^/api/(agents/[^/]+/gateway/(ui|assets|favicon|__openclaw__|embed).*)$ {
            proxy_pass $backend_api/$1$is_args$args;
            proxy_buffering off;
            proxy_read_timeout 30;
        }

        # 1d. Auth surface — credential stuffing / brute-force shield
        location ~ ^/api/(auth/(login|signup|oauth-login|session-upgrade|logout).*)$ {
            limit_req zone=auth_limit burst=10 nodelay;
            proxy_pass $backend_api/$1$is_args$args;
        }

        # 1e. Backend API (general) — loose per-IP cap as a DDoS/scrape fence
        location ~ ^/api/(.*)$ {
            limit_req zone=api_limit burst=60 nodelay;
            proxy_pass $backend_api/$1$is_args$args;
        }

        # 2. Admin Dashboard
        location /admin {
            proxy_pass $admin_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /admin/_next/ {
            proxy_pass $admin_dashboard;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # 3. App Dashboard
        location /app {
            proxy_pass $app_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }
        location /app/_next/ {
            proxy_pass $app_dashboard;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # 3. Next.js Static Assets & HMR WebSocket
        # Marketing uses root _next (includes webpack-hmr WebSocket)
        location /_next/ {
            proxy_pass $marketing_site;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
        }

        # 4. Marketing Pages (Root)
        location / {
            proxy_pass $marketing_site;
        }
    }
}
