services:
  backend-api:
    environment:
      ENABLED_BACKENDS: ${K3S_ENABLED_BACKENDS:-k3s}
      KUBECONFIG: /kubeconfig/config
      K8S_PROVIDER: k3s
      K8S_NAMESPACE: ${K3S_K8S_NAMESPACE:-openclaw-agents}
      K8S_EXPOSURE_MODE: ${K3S_K8S_EXPOSURE_MODE:-node-port}
      K8S_RUNTIME_HOST: ${K3S_K8S_RUNTIME_HOST:-host.docker.internal}
      K8S_RUNTIME_NODE_PORT: ${K3S_K8S_RUNTIME_NODE_PORT:-}
      K8S_GATEWAY_NODE_PORT: ${K3S_K8S_GATEWAY_NODE_PORT:-}
      K8S_SERVICE_ANNOTATIONS_JSON: ${K3S_K8S_SERVICE_ANNOTATIONS_JSON:-}
      K8S_LOAD_BALANCER_SOURCE_RANGES: ${K3S_K8S_LOAD_BALANCER_SOURCE_RANGES:-}
      K8S_LOAD_BALANCER_CLASS: ${K3S_K8S_LOAD_BALANCER_CLASS:-}
      K8S_LOAD_BALANCER_READY_TIMEOUT_MS: ${K3S_K8S_LOAD_BALANCER_READY_TIMEOUT_MS:-600000}
      K8S_LOAD_BALANCER_READY_INTERVAL_MS: ${K3S_K8S_LOAD_BALANCER_READY_INTERVAL_MS:-5000}
      DEPLOYMENT_JOB_TIMEOUT_MS: ${K3S_DEPLOYMENT_JOB_TIMEOUT_MS:-900000}
      PROVISION_TIMEOUT_MS: ${K3S_PROVISION_TIMEOUT_MS:-840000}
    volumes:
      - ${K3S_KUBECONFIG_PATH:-./.secrets/k3s-kubeconfig}:/kubeconfig/config:ro

  worker-provisioner:
    environment:
      DEPLOYMENT_WORKER_CONCURRENCY: ${DEPLOYMENT_WORKER_CONCURRENCY:-6}
      ENABLED_BACKENDS: ${K3S_ENABLED_BACKENDS:-k3s}
      KUBECONFIG: /kubeconfig/config
      K8S_PROVIDER: k3s
      K8S_NAMESPACE: ${K3S_K8S_NAMESPACE:-openclaw-agents}
      K8S_EXPOSURE_MODE: ${K3S_K8S_EXPOSURE_MODE:-node-port}
      K8S_RUNTIME_HOST: ${K3S_K8S_RUNTIME_HOST:-host.docker.internal}
      K8S_RUNTIME_NODE_PORT: ${K3S_K8S_RUNTIME_NODE_PORT:-}
      K8S_GATEWAY_NODE_PORT: ${K3S_K8S_GATEWAY_NODE_PORT:-}
      K8S_SERVICE_ANNOTATIONS_JSON: ${K3S_K8S_SERVICE_ANNOTATIONS_JSON:-}
      K8S_LOAD_BALANCER_SOURCE_RANGES: ${K3S_K8S_LOAD_BALANCER_SOURCE_RANGES:-}
      K8S_LOAD_BALANCER_CLASS: ${K3S_K8S_LOAD_BALANCER_CLASS:-}
      K8S_LOAD_BALANCER_READY_TIMEOUT_MS: ${K3S_K8S_LOAD_BALANCER_READY_TIMEOUT_MS:-600000}
      K8S_LOAD_BALANCER_READY_INTERVAL_MS: ${K3S_K8S_LOAD_BALANCER_READY_INTERVAL_MS:-5000}
      DEPLOYMENT_JOB_TIMEOUT_MS: ${K3S_DEPLOYMENT_JOB_TIMEOUT_MS:-900000}
      PROVISION_TIMEOUT_MS: ${K3S_PROVISION_TIMEOUT_MS:-840000}
    volumes:
      - ${K3S_KUBECONFIG_PATH:-./.secrets/k3s-kubeconfig}:/kubeconfig/config:ro
