services:
  backend-api:
    environment:
      ENABLED_BACKENDS: ${GKE_ENABLED_BACKENDS:-k8s}
      KUBECONFIG: /kubeconfig/config
      K8S_PROVIDER: gke
      K8S_NAMESPACE: ${GKE_K8S_NAMESPACE:-nora-openclaw-agents}
      K8S_OPENCLAW_NAMESPACE: ${GKE_K8S_OPENCLAW_NAMESPACE:-nora-openclaw-agents}
      K8S_HERMES_NAMESPACE: ${GKE_K8S_HERMES_NAMESPACE:-nora-hermes-agents}
      K8S_EXPOSURE_MODE: ${GKE_K8S_EXPOSURE_MODE:-load-balancer}
      K8S_SERVICE_ANNOTATIONS_JSON: ${GKE_K8S_SERVICE_ANNOTATIONS_JSON:-}
      K8S_LOAD_BALANCER_SOURCE_RANGES: ${GKE_K8S_LOAD_BALANCER_SOURCE_RANGES:-}
      K8S_LOAD_BALANCER_CLASS: ${GKE_K8S_LOAD_BALANCER_CLASS:-}
      K8S_LOAD_BALANCER_READY_TIMEOUT_MS: ${GKE_K8S_LOAD_BALANCER_READY_TIMEOUT_MS:-1200000}
      K8S_LOAD_BALANCER_READY_INTERVAL_MS: ${GKE_K8S_LOAD_BALANCER_READY_INTERVAL_MS:-5000}
      DEPLOYMENT_JOB_TIMEOUT_MS: ${GKE_DEPLOYMENT_JOB_TIMEOUT_MS:-1800000}
      PROVISION_TIMEOUT_MS: ${GKE_PROVISION_TIMEOUT_MS:-1740000}
    volumes:
      - ${GKE_KUBECONFIG_PATH:-./.secrets/gke-kubeconfig}:/kubeconfig/config:ro

  worker-provisioner:
    environment:
      DEPLOYMENT_WORKER_CONCURRENCY: ${DEPLOYMENT_WORKER_CONCURRENCY:-6}
      ENABLED_BACKENDS: ${GKE_ENABLED_BACKENDS:-k8s}
      KUBECONFIG: /kubeconfig/config
      K8S_PROVIDER: gke
      K8S_NAMESPACE: ${GKE_K8S_NAMESPACE:-nora-openclaw-agents}
      K8S_OPENCLAW_NAMESPACE: ${GKE_K8S_OPENCLAW_NAMESPACE:-nora-openclaw-agents}
      K8S_HERMES_NAMESPACE: ${GKE_K8S_HERMES_NAMESPACE:-nora-hermes-agents}
      K8S_EXPOSURE_MODE: ${GKE_K8S_EXPOSURE_MODE:-load-balancer}
      K8S_SERVICE_ANNOTATIONS_JSON: ${GKE_K8S_SERVICE_ANNOTATIONS_JSON:-}
      K8S_LOAD_BALANCER_SOURCE_RANGES: ${GKE_K8S_LOAD_BALANCER_SOURCE_RANGES:-}
      K8S_LOAD_BALANCER_CLASS: ${GKE_K8S_LOAD_BALANCER_CLASS:-}
      K8S_LOAD_BALANCER_READY_TIMEOUT_MS: ${GKE_K8S_LOAD_BALANCER_READY_TIMEOUT_MS:-1200000}
      K8S_LOAD_BALANCER_READY_INTERVAL_MS: ${GKE_K8S_LOAD_BALANCER_READY_INTERVAL_MS:-5000}
      DEPLOYMENT_JOB_TIMEOUT_MS: ${GKE_DEPLOYMENT_JOB_TIMEOUT_MS:-1800000}
      PROVISION_TIMEOUT_MS: ${GKE_PROVISION_TIMEOUT_MS:-1740000}
    volumes:
      - ${GKE_KUBECONFIG_PATH:-./.secrets/gke-kubeconfig}:/kubeconfig/config:ro
