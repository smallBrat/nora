name: Release Docker Images

on:
  push:
    branches:
      - master
    tags:
      - "v*.*.*"
    paths:
      - ".github/workflows/release-docker.yml"
      - ".github/workflows/deploy-production.yml"
      - ".github/workflows/scripts/require-workflow-success.mjs"
      - "tsconfig.base.json"
      - "admin-dashboard/**"
      - "frontend-dashboard/**"
      - "frontend-marketing/**"
      - "backend-api/**"
      - "agent-runtime/**"
      - "workers/provisioner/**"
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to publish
        required: false
        default: master

permissions:
  actions: read
  contents: read
  packages: write

concurrency:
  group: release-docker-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/master' }}

jobs:
  resolve-target:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.ref.outputs.ref }}
      sha: ${{ steps.sha.outputs.sha }}
    steps:
      - name: Resolve target ref
        id: ref
        run: |
          set -euo pipefail
          ref="${{ github.event.inputs.ref || '' }}"
          if [ -z "$ref" ]; then
            ref="${{ github.ref }}"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0
          persist-credentials: false
      - name: Resolve target SHA
        id: sha
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  verify-required-ci:
    name: Verify CI workflows
    runs-on: ubuntu-latest
    needs: resolve-target
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TARGET_SHA: ${{ needs.resolve-target.outputs.sha }}
      REQUIRED_WORKFLOWS: |
        CI Quality
        CI Compose Pipeline
        CI Security
        CodeQL
      OPTIONAL_WORKFLOWS: |
        CodeQL
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-target.outputs.ref }}
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
      - name: Wait for CI workflows on target commit
        run: node .github/workflows/scripts/require-workflow-success.mjs

  publish-images:
    name: "publish (${{ matrix.image }})"
    runs-on: ubuntu-latest
    needs:
      - resolve-target
      - verify-required-ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: nora-admin-dashboard
            dockerfile: admin-dashboard/Dockerfile
          - image: nora-frontend-dashboard
            dockerfile: frontend-dashboard/Dockerfile
          - image: nora-frontend-marketing
            dockerfile: frontend-marketing/Dockerfile
          - image: nora-backend-api
            dockerfile: backend-api/Dockerfile.prod
          - image: nora-worker-provisioner
            dockerfile: workers/provisioner/Dockerfile.prod
          - image: nora-worker-backup
            dockerfile: workers/backup/Dockerfile.prod
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-target.outputs.ref }}
          persist-credentials: false
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,prefix=sha-
            type=ref,event=tag
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
