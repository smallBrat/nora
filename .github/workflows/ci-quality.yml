name: CI Quality

on:
  workflow_dispatch:
  pull_request:
    paths: &quality_paths
      - ".github/workflows/ci-quality.yml"
      - ".github/workflows/deploy-production.yml"
      - ".github/workflows/release-docker.yml"
      - ".github/workflows/scripts/**"
      - ".prettierignore"
      - ".prettierrc.json"
      - "eslint.config.mjs"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.base.json"
      - "admin-dashboard/**"
      - "frontend-dashboard/**"
      - "frontend-marketing/**"
      - "backend-api/**"
      - "agent-runtime/**"
      - "workers/provisioner/**"
      - "e2e/**"
  push:
    branches:
      - master
    paths: *quality_paths

permissions:
  contents: read

jobs:
  lint-and-format:
    name: "${{ matrix.check }} (${{ matrix.package }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - admin-dashboard
          - frontend-dashboard
          - frontend-marketing
          - backend-api
          - workers/provisioner
        check:
          - eslint
          - prettier
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - id: changed-files
        shell: bash
        env:
          PACKAGE_DIR: ${{ matrix.package }}
          CHECK_KIND: ${{ matrix.check }}
          EVENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          EVENT_HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          base="$EVENT_BASE_SHA"
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-list --max-count=1 HEAD^ 2>/dev/null || true)"
          fi

          if [ -n "$base" ]; then
            mapfile -t candidates < <(git diff --name-only --diff-filter=ACMR "$base...$EVENT_HEAD_SHA" -- "$PACKAGE_DIR")
          else
            mapfile -t candidates < <(git ls-files "$PACKAGE_DIR")
          fi

          files=()
          for file in "${candidates[@]}"; do
            case "$file" in
              *.js|*.jsx|*.ts|*.tsx|*.cjs|*.mjs)
                files+=("$file")
                ;;
              *.css|*.json|*.yml|*.yaml)
                if [ "$CHECK_KIND" = "prettier" ]; then
                  files+=("$file")
                fi
                ;;
            esac
          done

          if [ "${#files[@]}" -eq 0 ]; then
            echo "any_changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "any_changed=true"
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - if: matrix.check == 'eslint' && steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          mapfile -t files < <(printf '%s\n' "${{ steps.changed-files.outputs.files }}")
          npm run ci:lint -- "${files[@]}"
      - if: matrix.check == 'prettier' && steps.changed-files.outputs.any_changed == 'true'
        shell: bash
        run: |
          mapfile -t files < <(printf '%s\n' "${{ steps.changed-files.outputs.files }}")
          npm run ci:format:check -- "${files[@]}"

  typecheck:
    name: "typecheck (${{ matrix.package }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - admin-dashboard
          - frontend-dashboard
          - frontend-marketing
          - backend-api
          - agent-runtime
          - workers/provisioner
          - e2e
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.package }}
      - run: npm run typecheck
        working-directory: ${{ matrix.package }}
