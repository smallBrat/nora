name: CI Security

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  secret-scan:
    name: Sensitive config scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run ci:secret-scan

  dependency-audit:
    name: "npm audit (${{ matrix.package }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - admin-dashboard
          - frontend-dashboard
          - frontend-marketing
          - backend-api
          - agent-runtime
          - workers/provisioner
          - e2e
          - mcp-server
          - cli
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json
      - run: npm ci
        working-directory: ${{ matrix.package }}
      - run: npm audit --omit=dev --audit-level=high
        working-directory: ${{ matrix.package }}

  license-compliance:
    name: "license policy (${{ matrix.package }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - admin-dashboard
          - frontend-dashboard
          - frontend-marketing
          - backend-api
          - agent-runtime
          - workers/provisioner
          - e2e
          - mcp-server
          - cli
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ${{ matrix.package }}/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: ${{ matrix.package }}
      - run: npm run ci:license-check -- ${{ matrix.package }}

  infra-validation:
    name: Infra validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz \
            | tar -xz kubeconform
          sudo mv kubeconform /usr/local/bin/kubeconform
      - run: npm run ci:validate-infra
