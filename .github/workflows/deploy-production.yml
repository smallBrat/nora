name: Deploy Production

on:
  workflow_run:
    workflows:
      - Release Docker Images
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: master
      version:
        description: Override NORA_CURRENT_VERSION for this deploy
        required: false
        default: ""

permissions:
  actions: read
  contents: read

concurrency:
  group: nora-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://nora.solomontsao.com
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
      DEPLOY_PORT: ${{ vars.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      DEPLOY_ENV_FILE: ${{ vars.DEPLOY_ENV_FILE || '.env' }}
      DEPLOY_COMPOSE_FILES: ${{ vars.DEPLOY_COMPOSE_FILES || 'docker-compose.yml:infra/docker-compose.public-prod.yml:infra/docker-compose.public-tls.yml' }}
      NORA_GITHUB_REPO: ${{ vars.NORA_GITHUB_REPO || github.repository }}
      INPUT_REF: ${{ github.event.inputs.ref || '' }}
      INPUT_VERSION: ${{ github.event.inputs.version || '' }}
      WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha || '' }}
    steps:
      - name: Validate deployment config
        run: |
          set -euo pipefail
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_KNOWN_HOSTS DEPLOY_PATH; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required deployment setting: $name" >&2
              exit 1
            fi
          done

      - name: Resolve target ref
        id: target
        run: |
          set -euo pipefail
          ref="${INPUT_REF:-}"
          if [ -z "$ref" ] && [ -n "$WORKFLOW_RUN_SHA" ]; then
            ref="$WORKFLOW_RUN_SHA"
          fi
          if [ -z "$ref" ]; then
            ref="master"
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.target.outputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Compute deployed version metadata
        id: release_meta
        run: |
          set -euo pipefail
          commit="$(git rev-parse HEAD)"
          exact_tag="$(git tag --points-at HEAD | head -n 1 || true)"

          version="${INPUT_VERSION:-}"
          if [ -z "$version" ] && [ -n "$exact_tag" ]; then
            version="$exact_tag"
          fi
          if [ -z "$version" ]; then
            latest_tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            if [ -n "$latest_tag" ] && git merge-base --is-ancestor "$latest_tag" HEAD; then
              version="$latest_tag"
            fi
          fi
          if [ -z "$version" ]; then
            version=""
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Verify required CI workflows
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_SHA: ${{ steps.release_meta.outputs.commit }}
          REQUIRED_WORKFLOWS: |
            CI Quality
            CI Compose Pipeline
            CI Security
            CodeQL
          OPTIONAL_WORKFLOWS: |
            CodeQL
        run: node .github/workflows/scripts/require-workflow-success.mjs

      - name: Configure SSH
        run: |
          set -euo pipefail
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on remote host
        env:
          TARGET_REF: ${{ steps.target.outputs.ref }}
          TARGET_VERSION: ${{ steps.release_meta.outputs.version }}
          TARGET_COMMIT: ${{ steps.release_meta.outputs.commit }}
        run: |
          set -euo pipefail

          ssh -i ~/.ssh/id_ed25519 \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -p "$DEPLOY_PORT" \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' \
            DEPLOY_REF='$TARGET_REF' \
            DEPLOY_ENV_FILE='$DEPLOY_ENV_FILE' \
            DEPLOY_COMPOSE_FILES='$DEPLOY_COMPOSE_FILES' \
            TARGET_VERSION='$TARGET_VERSION' \
            TARGET_COMMIT='$TARGET_COMMIT' \
            NORA_GITHUB_REPO='$NORA_GITHUB_REPO' \
            bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_PATH"

          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            echo "Remote repo has uncommitted changes; refusing to deploy over a dirty worktree." >&2
            git status --short --untracked-files=no >&2
            exit 1
          fi

          git fetch --tags origin
          git checkout "$DEPLOY_REF"

          if git ls-remote --exit-code --heads origin "$DEPLOY_REF" >/dev/null 2>&1; then
            git pull --ff-only origin "$DEPLOY_REF"
          fi

          if [ ! -f "$DEPLOY_ENV_FILE" ]; then
            echo "Missing deploy env file: $DEPLOY_ENV_FILE" >&2
            echo "Refusing to deploy with an empty generated env; run setup first or fix DEPLOY_ENV_FILE." >&2
            exit 1
          fi

          for required_key in JWT_SECRET ENCRYPTION_KEY DB_PASSWORD; do
            if ! grep -Eq "^${required_key}=.+" "$DEPLOY_ENV_FILE"; then
              echo "Deploy env file $DEPLOY_ENV_FILE is missing required key: $required_key" >&2
              exit 1
            fi
          done

          bash infra/update-release-env.sh \
            "$DEPLOY_ENV_FILE" \
            "$TARGET_VERSION" \
            "$TARGET_COMMIT" \
            "$NORA_GITHUB_REPO"

          compose_args=(--env-file "$DEPLOY_ENV_FILE")
          IFS=':' read -r -a compose_files <<< "$DEPLOY_COMPOSE_FILES"
          for compose_file in "${compose_files[@]}"; do
            if [ -n "$compose_file" ]; then
              compose_args+=(-f "$compose_file")
            fi
          done

          export NORA_ENV_FILE="$DEPLOY_ENV_FILE"
          echo "Code update only: preserving compose volumes and provisioned agent Docker/K8s/VM instances."
          docker compose "${compose_args[@]}" up -d --build
          docker compose "${compose_args[@]}" ps

          echo "Waiting for backend-api health..."
          for attempt in $(seq 1 30); do
            if docker compose "${compose_args[@]}" exec -T backend-api \
              node -e "require('http').get('http://localhost:4000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"; then
              echo "backend-api is healthy."
              break
            fi

            if [ "$attempt" -eq 30 ]; then
              echo "backend-api did not become healthy after deploy." >&2
              docker compose "${compose_args[@]}" ps >&2 || true
              docker compose "${compose_args[@]}" logs --tail=120 backend-api >&2 || true
              exit 1
            fi

            sleep 3
          done
          REMOTE

      - name: Deployment summary
        env:
          TARGET_REF: ${{ steps.target.outputs.ref }}
          TARGET_VERSION: ${{ steps.release_meta.outputs.version }}
          TARGET_COMMIT: ${{ steps.release_meta.outputs.commit }}
        run: |
          {
            echo "### Nora production deploy complete"
            echo ""
            echo "- Site: \`https://nora.solomontsao.com\`"
            echo "- Ref: \`$TARGET_REF\`"
            echo "- Version: \`$TARGET_VERSION\`"
            echo "- Commit: \`$TARGET_COMMIT\`"
            echo "- Host: \`$DEPLOY_HOST\`"
            echo "- Env file: \`$DEPLOY_ENV_FILE\`"
          } >> "$GITHUB_STEP_SUMMARY"
