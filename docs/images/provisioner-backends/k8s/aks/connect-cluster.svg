<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1512"
  height="1080"
  viewBox="0 0 1512 1080"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Azure Portal AKS connect blade</title>
  <desc id="desc">
    Reference screenshot showing the AKS Connect blade and the Azure CLI get-credentials command.
  </desc>
  <defs>
    <style>
      .bg {
        fill: #f5f7fb;
      }
      .top {
        fill: #0078d4;
      }
      .blade {
        fill: #ffffff;
        stroke: #d8dee8;
        stroke-width: 1;
      }
      .side {
        fill: #ffffff;
      }
      .title {
        fill: #111827;
        font:
          38px "Segoe UI",
          Arial,
          sans-serif;
        font-weight: 600;
      }
      .text {
        fill: #1f2937;
        font:
          26px "Segoe UI",
          Arial,
          sans-serif;
      }
      .small {
        fill: #475569;
        font:
          21px "Segoe UI",
          Arial,
          sans-serif;
      }
      .tiny {
        fill: #64748b;
        font:
          18px "Segoe UI",
          Arial,
          sans-serif;
      }
      .mono {
        fill: #0f172a;
        font:
          22px Consolas,
          "Courier New",
          monospace;
      }
      .link {
        fill: #0067b8;
        font:
          24px "Segoe UI",
          Arial,
          sans-serif;
      }
      .tab {
        fill: #eef6fd;
        stroke: #8dc8ef;
        stroke-width: 1;
      }
      .code {
        fill: #f8fafc;
        stroke: #cbd5e1;
        stroke-width: 1;
      }
      .highlight {
        fill: #fff6cc;
        stroke: #f2c94c;
        stroke-width: 3;
      }
      .success {
        fill: #107c10;
      }
    </style>
  </defs>

  <rect class="bg" width="1512" height="1080" />
  <rect class="top" width="1512" height="64" />
  <text
    x="30"
    y="41"
    fill="#ffffff"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="27"
    font-weight="600"
  >
    Microsoft Azure
  </text>
  <rect x="282" y="14" width="620" height="36" rx="4" fill="#ffffff" opacity="0.96" />
  <text x="304" y="39" class="tiny">Search resources, services, and docs</text>
  <circle cx="1332" cy="32" r="14" fill="#ffffff" opacity="0.9" />
  <circle cx="1384" cy="32" r="14" fill="#ffffff" opacity="0.9" />
  <circle cx="1436" cy="32" r="18" fill="#ffffff" opacity="0.9" />

  <rect x="0" y="64" width="230" height="1016" class="side" />
  <line x1="230" y1="64" x2="230" y2="1080" stroke="#d8dee8" />
  <text x="28" y="120" class="small">Overview</text>
  <rect x="14" y="146" width="202" height="48" rx="4" fill="#eef6fd" />
  <rect x="14" y="146" width="4" height="48" fill="#0078d4" />
  <text x="28" y="178" class="small">Connect</text>
  <text x="28" y="234" class="small">Activity log</text>
  <text x="28" y="288" class="small">Access control</text>
  <text x="28" y="342" class="small">Networking</text>
  <text x="28" y="396" class="small">Node pools</text>

  <rect x="258" y="92" width="1218" height="948" rx="6" class="blade" />
  <text x="292" y="154" class="title">nora-aks-prod | Connect</text>
  <text x="292" y="193" class="small">Kubernetes service</text>
  <line x1="258" y1="222" x2="1476" y2="222" stroke="#e5e7eb" />

  <text x="292" y="282" class="text">Connect to your cluster</text>
  <text x="292" y="320" class="small">Use Azure CLI from the host that will run Nora.</text>

  <rect x="292" y="362" width="194" height="52" rx="4" class="tab" />
  <text x="334" y="397" class="link">Azure CLI</text>
  <rect x="502" y="362" width="154" height="52" rx="4" fill="#ffffff" stroke="#cbd5e1" />
  <text x="536" y="397" class="small">Kubectl</text>
  <rect x="672" y="362" width="194" height="52" rx="4" fill="#ffffff" stroke="#cbd5e1" />
  <text x="708" y="397" class="small">Cloud Shell</text>

  <rect x="292" y="454" width="1138" height="92" rx="6" fill="#f8fafc" stroke="#d8dee8" />
  <circle cx="332" cy="500" r="11" class="success" />
  <text x="358" y="508" class="text">Prerequisites</text>
  <text x="556" y="508" class="small">
    Azure CLI installed, signed in, and subscription selected.
  </text>

  <text x="292" y="606" class="text">Run this command</text>
  <rect x="292" y="638" width="1138" height="246" rx="6" class="code" />
  <rect x="318" y="666" width="1086" height="156" rx="6" class="highlight" />
  <text x="342" y="706" class="mono">az aks get-credentials \</text>
  <text x="342" y="750" class="mono">--resource-group nora-prod-rg \</text>
  <text x="342" y="794" class="mono">--name nora-aks-prod \</text>
  <text x="342" y="838" class="mono">--admin --overwrite-existing</text>
  <rect x="1216" y="832" width="166" height="38" rx="4" fill="#0078d4" />
  <text
    x="1260"
    y="858"
    fill="#ffffff"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="20"
    font-weight="600"
  >
    Copy
  </text>

  <rect x="292" y="920" width="1138" height="70" rx="6" fill="#f8fafc" stroke="#d8dee8" />
  <text x="322" y="964" class="small">
    Nora writes this command to ./.secrets/aks-kubeconfig by adding --file in the setup step.
  </text>
</svg>
