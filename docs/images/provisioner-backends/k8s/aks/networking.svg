  width="1512"
  height="1080"
  viewBox="0 0 1512 1080"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Azure Portal AKS networking settings</title>
  <desc id="desc">
    Reference screenshot showing AKS networking settings and the LoadBalancer SKU field.
  </desc>
  <defs>
    <style>
      .bg {
        fill: #f5f7fb;
      }
      .top {
