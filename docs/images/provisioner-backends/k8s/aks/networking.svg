          Arial,
          sans-serif;
        font-weight: 600;
      }
      .section {
        fill: #111827;
        font:
          30px "Segoe UI",
          Arial,
          sans-serif;
        font-weight: 600;
      }
      .text {
        fill: #1f2937;
        font:
          26px "Segoe UI",
          Arial,
          sans-serif;
      }
      .small {
        fill: #475569;
        font:
          21px "Segoe UI",
          Arial,
          sans-serif;
      }
      .tiny {
        fill: #64748b;
        font:
          18px "Segoe UI",
          Arial,
          sans-serif;
      }
      .link {
        fill: #0067b8;
        font:
          24px "Segoe UI",
          Arial,
          sans-serif;
      }
      .highlight {
        fill: #fff6cc;
        stroke: #f2c94c;
        stroke-width: 3;
      }
      .row {
        fill: #ffffff;
        stroke: #e5e7eb;
        stroke-width: 1;
      }
      .pill {
        fill: #e7f2fb;
        stroke: #8dc8ef;
        stroke-width: 1;
      }
