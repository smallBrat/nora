<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1512"
  height="1080"
  viewBox="0 0 1512 1080"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Azure Portal AKS cluster overview</title>
  <desc id="desc">
    Reference screenshot showing an AKS cluster overview blade with the cluster name and resource
    group highlighted.
  </desc>
  <defs>
    <style>
      .bg {
        fill: #f5f7fb;
      }
      .top {
        fill: #0078d4;
      }
      .nav {
        fill: #ffffff;
      }
      .blade {
        fill: #ffffff;
        stroke: #d8dee8;
        stroke-width: 1;
      }
      .muted {
        fill: #64748b;
        font:
          24px "Segoe UI",
          Arial,
          sans-serif;
      }
      .text {
        fill: #1f2937;
        font:
          26px "Segoe UI",
          Arial,
          sans-serif;
      }
      .small {
        fill: #475569;
        font:
          21px "Segoe UI",
          Arial,
          sans-serif;
      }
      .tiny {
        fill: #64748b;
        font:
          18px "Segoe UI",
          Arial,
          sans-serif;
      }
      .title {
        fill: #111827;
        font:
          38px "Segoe UI",
          Arial,
          sans-serif;
        font-weight: 600;
      }
      .mono {
        fill: #0f172a;
        font:
          21px Consolas,
          "Courier New",
          monospace;
      }
      .link {
        fill: #0067b8;
        font:
          24px "Segoe UI",
          Arial,
          sans-serif;
      }
      .pill {
        fill: #e7f2fb;
        stroke: #8dc8ef;
        stroke-width: 1;
      }
      .highlight {
        fill: #fff6cc;
        stroke: #f2c94c;
        stroke-width: 3;
      }
      .success {
        fill: #107c10;
      }
    </style>
  </defs>

  <rect class="bg" width="1512" height="1080" />
  <rect class="top" width="1512" height="64" />
  <text
    x="30"
    y="41"
    fill="#ffffff"
    font-family="Segoe UI, Arial, sans-serif"
    font-size="27"
    font-weight="600"
  >
    Microsoft Azure
  </text>
  <rect x="282" y="14" width="620" height="36" rx="4" fill="#ffffff" opacity="0.96" />
  <text x="304" y="39" class="tiny">Search resources, services, and docs</text>
  <circle cx="1332" cy="32" r="14" fill="#ffffff" opacity="0.9" />
  <circle cx="1384" cy="32" r="14" fill="#ffffff" opacity="0.9" />
  <circle cx="1436" cy="32" r="18" fill="#ffffff" opacity="0.9" />

  <rect x="0" y="64" width="230" height="1016" fill="#ffffff" />
  <line x1="230" y1="64" x2="230" y2="1080" stroke="#d8dee8" />
  <text x="28" y="120" class="muted">Home</text>
  <text x="28" y="174" class="muted">Dashboard</text>
  <text x="28" y="228" class="muted">All services</text>
  <text x="28" y="282" class="muted">Resource groups</text>
  <text x="28" y="336" class="muted">Kubernetes services</text>
  <rect x="14" y="305" width="202" height="48" rx="4" fill="#eef6fd" />
  <rect x="14" y="305" width="4" height="48" fill="#0078d4" />

  <rect x="258" y="92" width="1218" height="948" rx="6" class="blade" />
