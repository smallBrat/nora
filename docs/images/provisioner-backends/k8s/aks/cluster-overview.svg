  <text x="292" y="193" class="small">Kubernetes service</text>
  <line x1="258" y1="222" x2="1476" y2="222" stroke="#e5e7eb" />

  <rect x="292" y="250" width="128" height="44" rx="4" class="pill" />
  <text x="322" y="280" class="link">Connect</text>
  <rect x="438" y="250" width="118" height="44" rx="4" fill="#ffffff" stroke="#cbd5e1" />
  <text x="461" y="280" class="small">Refresh</text>
  <rect x="574" y="250" width="136" height="44" rx="4" fill="#ffffff" stroke="#cbd5e1" />
  <text x="598" y="280" class="small">Delete</text>

  <text x="292" y="348" class="title" font-size="30">Essentials</text>
  <rect x="292" y="382" width="1138" height="198" rx="6" fill="#ffffff" stroke="#d8dee8" />
  <rect x="318" y="414" width="506" height="60" rx="6" class="highlight" />
  <text x="338" y="439" class="tiny">Resource group</text>
  <text x="338" y="466" class="link">nora-prod-rg</text>
  <rect x="318" y="492" width="506" height="60" rx="6" class="highlight" />
  <text x="338" y="517" class="tiny">Cluster name</text>
  <text x="338" y="544" class="text">nora-aks-prod</text>

  <text x="874" y="439" class="tiny">Status</text>
  <circle cx="890" cy="461" r="9" class="success" />
  <text x="910" y="469" class="text">Running</text>
  <text x="874" y="517" class="tiny">Location</text>
  <text x="874" y="544" class="text">East US</text>
  <text x="1122" y="439" class="tiny">Subscription</text>
  <text x="1122" y="466" class="text">Production</text>
  <text x="1122" y="517" class="tiny">Kubernetes version</text>
  <text x="1122" y="544" class="text">1.30.8</text>

  <rect x="292" y="620" width="548" height="268" rx="6" fill="#ffffff" stroke="#d8dee8" />
  <text x="322" y="666" class="text">Cluster health</text>
  <line x1="322" y1="704" x2="808" y2="704" stroke="#e5e7eb" />
  <text x="322" y="752" class="small">Node pools</text>
  <text x="720" y="752" class="text">2</text>
  <text x="322" y="804" class="small">Ready nodes</text>
  <text x="720" y="804" class="text">6</text>
  <text x="322" y="856" class="small">Availability zones</text>
  <text x="720" y="856" class="text">1, 2, 3</text>

  <rect x="882" y="620" width="548" height="268" rx="6" fill="#ffffff" stroke="#d8dee8" />
  <text x="912" y="666" class="text">API server</text>
  <line x1="912" y1="704" x2="1398" y2="704" stroke="#e5e7eb" />
  <text x="912" y="752" class="small">Endpoint</text>
  <text x="912" y="790" class="mono">https://nora-aks-prod-...</text>
  <text x="912" y="846" class="small">Authentication</text>
  <text x="912" y="878" class="text">Local accounts enabled</text>

  <rect x="292" y="922" width="1138" height="70" rx="6" fill="#f8fafc" stroke="#d8dee8" />
  <text x="322" y="966" class="small">
    Use the highlighted cluster name and resource group in the az aks get-credentials command.
  </text>
</svg>
